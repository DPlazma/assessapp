<!-- Notifications Widget -->
{% with notifs=widget.extra_context.dashboard_notifications %}
{% if notifs %}
<div class="list-group list-group-flush">
    {% for notif in notifs %}
    <a href="{{ notif.link }}" class="list-group-item list-group-item-action px-0 py-2 small">
        <div class="d-flex align-items-start">
            <i class="bi {{ notif.icon }} me-2 mt-1"></i>
            <div>
                <strong>{{ notif.title }}</strong><br>
                <span class="text-muted">{{ notif.message|truncatechars:80 }}</span>
            </div>
            <span class="badge {{ notif.badge_class }} ms-auto flex-shrink-0">{{ notif.priority }}</span>
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="text-center text-muted py-3">
    <i class="bi bi-bell-slash" style="font-size: 2rem;"></i>
    <p class="small mb-0 mt-2">No unread notifications.</p>
</div>
{% endif %}
{% endwith %}
