<!-- Recent Activity -->
{% if recent_assessments %}
<div class="list-group list-group-flush">
    {% for record in recent_assessments %}
    <div class="list-group-item px-0 py-2">
        <div class="d-flex align-items-center">
            <span class="badge status-{{ record.status }} me-2" style="min-width: 28px;">
                {{ record.get_status_display.0 }}
            </span>
            <div class="small flex-grow-1">
                <strong>{{ record.student.full_name }}</strong><br>
                <span class="text-muted">
                    {{ record.statement.area.subject.name }} &middot;
                    {{ record.assessed_date|date:"d-m" }}
                </span>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center text-muted py-3">
    <i class="bi bi-clock-history" style="font-size: 2rem;"></i>
    <p class="small mb-0 mt-2">No recent assessments.</p>
</div>
{% endif %}
