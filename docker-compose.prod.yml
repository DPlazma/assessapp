services:
  db:
    restart: unless-stopped

  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py load_sen_frameworks &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 900 --access-logfile - --error-logfile - --capture-output --log-level info"
    ports:
      # Bind to host loopback only — Cloudflare Tunnel (host-network) reaches
      # this via http://localhost:8000. Not exposed to the LAN.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  # Bundled nginx is not used in this deployment because Cloudflare Tunnel
  # terminates TLS and proxies straight to gunicorn.
  nginx:
    profiles: ["disabled"]
